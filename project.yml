name: ReelsStudio
options:
  bundleIdPrefix: com.steliyanh
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  Kadr:
    url: https://github.com/SteliyanH/kadr.git
    from: 0.11.0
  KadrUI:
    url: https://github.com/SteliyanH/kadr-ui.git
    from: 0.10.1
  KadrCaptions:
    url: https://github.com/SteliyanH/kadr-captions.git
    from: 0.4.0
  KadrPhotos:
    url: https://github.com/SteliyanH/kadr-photos.git
    from: 0.4.0

targets:
  ReelsStudio:
    type: application
    platform: iOS
    sources:
      - path: Sources/ReelsStudio
    info:
      path: Sources/ReelsStudio/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "Reels Studio reads your photos and videos so you can import them as clips."
        CFBundleDisplayName: Reels Studio
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.steliyanh.reels-studio
        PRODUCT_NAME: ReelsStudio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Kadr
      - package: KadrUI
      - package: KadrCaptions
      - package: KadrPhotos

  ReelsStudioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ReelsStudioTests
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ReelsStudio.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ReelsStudio
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ReelsStudio

schemes:
  ReelsStudio:
    build:
      targets:
        ReelsStudio: all
        ReelsStudioTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReelsStudioTests
    archive:
      config: Release
