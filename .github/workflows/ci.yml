name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Pick an iPhone simulator UDID
        id: simulator
        run: |
          # List available iPhone simulators across all iOS runtimes; pick the one
          # with the highest runtime version. Using a UDID destination avoids the
          # `OS=latest` mismatch that bites when an older device (e.g. iPhone SE)
          # has no current-OS runtime.
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              m = re.search(r'iOS-(\d+(?:-\d+)*)', runtime)
              if not m:
                  continue
              version = tuple(int(p) for p in m.group(1).split('-'))
              for d in devices:
                  if 'iPhone' in d['name']:
                      candidates.append((version, d['name'], d['udid']))
          candidates.sort()
          if candidates:
              print(candidates[-1][2])
          ")
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on this runner"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
      - name: Build + test
        run: |
          xcodebuild test \
            -project ReelsStudio.xcodeproj \
            -scheme ReelsStudio \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO
